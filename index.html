<!DOCTYPE html>
<html>
<head>
    <!-- 1. The SEO Shield: Tells Google this page is a duplicate of your main org -->
    <link rel="canonical" href="https://github.com/statefullm" />
    
    <!-- 2. The Browser Redirect: Automatically bounces human traffic after 1 second -->
    <meta http-equiv="refresh" content="1;url=https://github.com/statefullm" />
    
    <title>Defensive Registration</title>
</head>
<body>
    <p>This organization is defensively registered to prevent typosquatting.</p>
    <p>Redirecting you to the official repository: <a href="https://github.com/statefullm">github.com/statefullm</a>...</p>
</body>
</html>
